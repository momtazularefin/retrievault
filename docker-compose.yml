services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - CORPUS_TAG=0.136.3
      - RETRIEVAULT_SYNTHESIS_MODEL=claude-sonnet-4-6
    volumes:
      - ./backend:/app
    depends_on:
      - qdrant

volumes:
  qdrant_data:
